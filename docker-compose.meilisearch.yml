services:
  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-local-master-key}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    command: meilisearch --env=development

volumes:
  meili_data:
